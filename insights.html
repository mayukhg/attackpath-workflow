// ── Tooltip (portal-based — never clipped by overflow) ────────────────────
function Tooltip({ content, children, width=256 }) {
  const [rect, setRect] = React.useState(null);
  const ref = React.useRef(null);
  const show = () => { if (ref.current) setRect(ref.current.getBoundingClientRect()); };
  const hide = () => setRect(null);
  return (
    <span ref={ref} style={{display:'inline-flex',alignItems:'center',verticalAlign:'middle'}}
      onMouseEnter={show} onMouseLeave={hide}>
      {children}
      {rect && ReactDOM.createPortal(
        <div style={{
          position:'fixed',
          left: rect.left + rect.width / 2,
          top: rect.top - 8,
          transform:'translateX(-50%) translateY(-100%)',
          zIndex:99999,
          width,
          background:'#0f172a',
          color:'#fff',
          borderRadius:8,
          padding:'10px 12px',
          fontSize:11,
          lineHeight:1.5,
          boxShadow:'0 4px 24px rgba(0,0,0,.5)',
          pointerEvents:'none',
          whiteSpace:'normal',
        }}>
          {content}
          <div style={{position:'absolute',top:'100%',left:'50%',transform:'translateX(-50%)',
            width:0,height:0,borderLeft:'5px solid transparent',borderRight:'5px solid transparent',
            borderTop:'5px solid #0f172a'}}/>
        </div>,
        document.body
      )}
    </span>
  );
}

// ── Asset type helpers ────────────────────────────────────────────────────
function getNodeAssetType(node) {
  if (node.isStart) {
    if (node.icon === '🌐') return 'Internet Entry Point';
    if (node.icon === '☁️') return 'Cloud Storage';
    if (node.icon === '🔐') return 'VPN / Network Access';
    if (node.icon === '⚡') return 'Serverless Function';
    return 'Entry Point';
  }
  if (node.crown) return 'Crown Jewel (Database)';
  if (node.icon === '🔑') return 'Identity / IAM Role';
  if (node.icon === '👤') return 'Identity / Account';
  if (node.icon === '⚡') return 'Serverless Function';
  if (node.icon === '🖥️') return 'Host / VM';
  return 'Service / Middleware';
}

function getAssetTypeBreakdown(ap) {
  const types = {};
  ap.flowNodes.forEach(n => {
    const t = getNodeAssetType(n);
    types[t] = (types[t] || 0) + 1;
  });
  return types;
}

function calcAvgRoi(actions) {
  const vals = actions.map(a => parseFloat(a.roi)).filter(v => !isNaN(v));
  if (!vals.length) return 'N/A';
  return (vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1);
}

  function pathSearchText(p) {
    return [
      p.title, p.target, p.entry, p.path, p.mitre, String(p.id), p.status,
      ...p.flowNodes.map(n => n.label),
      ...p.flowNodes.map(n => n.edge||''),
      ...p.gaps_detail.map(g => g.label + ' ' + g.value),
      ...(p.edgeGaps||[]).flatMap(eg => [eg.from, eg.to, eg.tech, ...eg.gaps.map(g=>g.v)]),
      ...p.remediation.map(r => r.action),

  // Return a human-readable label for what field matched (null = title matched, no label needed)
  function matchReason(p, q) {
    const lq = q.toLowerCase();
    if (p.title.toLowerCase().includes(lq))  return null;
    if (p.path.toLowerCase().includes(lq))   return null;
    if (String(p.id).includes(lq))           return 'CID';
    if (p.target.toLowerCase().includes(lq)) return `Crown Jewel: ${p.target}`;
    if (p.entry.toLowerCase().includes(lq))  return `Entry Point: ${p.entry}`;
    if (p.mitre.toLowerCase().includes(lq))  return `MITRE: ${p.mitre}`;
    for (const n of p.flowNodes) {
      if (n.label.toLowerCase().includes(lq)) return `Node: ${n.label}`;
      if ((n.edge||'').toLowerCase().includes(lq)) return `Technique: ${n.edge}`;
    }
    for (const g of p.gaps_detail) {
      if (g.value.toLowerCase().includes(lq)) return `Gap: ${g.label.replace(':','')} `;
    }
    for (const eg of (p.edgeGaps||[])) {
      if (eg.tech.toLowerCase().includes(lq)) return `Edge technique: ${eg.tech}`;
      for (const g of eg.gaps) {
        if (g.v.toLowerCase().includes(lq)) return `Security gap`;
      }
    }
    for (const r of p.remediation) {
      if (r.action.toLowerCase().includes(lq)) return `Remediation action`;
    }
    return 'Other match';

// ════════════════════════════════════════════════════════════════════════════
function RemediateTab({ selectedPath, setActiveTab }) {
  const [actionStates, setActionStates] = useState({});

  const toggle = (key, state) => setActionStates(prev => ({ ...prev, [key]: prev[key]===state?null:state }));

  const priorityColors = {
    CRITICAL: { bg:'bg-red-50', border:'border-red-200', badge:'bg-red-100 text-red-700',    dot:'bg-red-500' },
    HIGH:     { bg:'bg-orange-50', border:'border-orange-200', badge:'bg-orange-100 text-orange-700', dot:'bg-orange-500' },
    MEDIUM:   { bg:'bg-yellow-50', border:'border-yellow-200', badge:'bg-yellow-100 text-yellow-700', dot:'bg-yellow-500' },
    LOW:      { bg:'bg-green-50',  border:'border-green-200',  badge:'bg-green-100 text-green-700',   dot:'bg-green-500' },
  };

  const actions = selectedPath
    ? selectedPath.remediation
    : ATTACK_PATHS.flatMap(ap => ap.remediation.map(r=>({...r,pathId:ap.id,pathTitle:ap.title})))
        .filter((r,i,arr)=>arr.findIndex(x=>x.action===r.action)===i).slice(0,12);

  const toxicCombos = TOXIC_COMBOS;

  const avgRoi = calcAvgRoi(actions);
  const summaryStats = [
    {label:'Toxic Combos',  value:'3',     color:'text-red-600'},
    {label:'Score Elevated',value:'3',     color:'text-orange-600'},
    {label:'Avg ROI',       value:avgRoi,  color:'text-emerald-600'},
  ];

  return (
    <div className="space-y-5">
      {/* Stats */}
      <div className="grid grid-cols-3 gap-3">
        {summaryStats.map(s=>(
          <div key={s.label} className="bg-white rounded-lg border border-slate-200 p-3 text-center">
            {s.label==='Avg ROI' ? (
              <Tooltip width="w-72" content={
                <span>
                  <span style={{display:'block',fontWeight:700,marginBottom:4,borderBottom:'1px solid #334155',paddingBottom:4}}>Average ROI across all actions</span>
                  <span style={{display:'block',marginBottom:3}}>Calculated as: Risk Reduction Value ÷ Remediation Cost</span>
                  <span style={{display:'block',color:'#6ee7b7',marginTop:4}}>Based on $4.45M avg breach cost (IBM 2024) weighted by CVSS severity and path topology</span>
                </span>
              }>
                <span className={`text-xl font-bold ${s.color} cursor-help flex items-center justify-center gap-1`}>
                  {s.value}<InfoIcon size={12} />
                </span>
              </Tooltip>
            ) : (
              <div className={`text-xl font-bold ${s.color}`}>{s.value}</div>
            )}
            <div className="text-[10px] text-slate-500 mt-0.5 leading-tight">{s.label}</div>
          </div>
        ))}
      </div>

      {/* Remediation Actions */}
      <div className="bg-white rounded-lg border border-slate-200 p-4">
        <div className="flex items-center justify-between mb-1">
          <div className="flex items-center gap-2">
            <WrenchIcon size={16} />
            <h3 data-tip="Actions ranked by risk impact score × effort efficiency — Critical items must be resolved immediately to sever active attack chains" className="font-semibold text-slate-800 text-sm cursor-help">
              Recommended Remediation Actions
              {selectedPath && <span className="font-normal text-slate-500 ml-1">— {selectedPath.title}</span>}
            </h3>
          </div>
          <div className="flex gap-3 text-[10px] text-slate-500">
            {[['bg-red-500','Critical'],['bg-orange-500','High'],['bg-yellow-500','Medium']].map(([c,l])=>(
              <span key={l} className="flex items-center gap-1">
                <span className={`w-2 h-2 rounded-full inline-block ${c}`}></span>{l}
              </span>
            ))}
          </div>
        </div>
        <p className="text-[11px] text-slate-500 mb-3">Prioritized fixes ranked by risk impact — resolve Critical items immediately to break active attack chains.</p>
        <div className="space-y-2">
          {actions.map((a,idx)=>{
            const c = priorityColors[a.priority]||priorityColors.LOW;
            const key = `${a.action}-${idx}`;
            const st = actionStates[key];
            return (
              <div key={key} className={`border ${c.border} ${c.bg} rounded-lg p-3 flex items-center gap-3`}>
                <span className={`w-2 h-2 rounded-full shrink-0 ${c.dot}`}></span>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-0.5">
                    <span data-tip={a.priority==='CRITICAL'?'Resolve within 24h — active exploit path to Crown Jewel':a.priority==='HIGH'?'Resolve within 7 days — significant risk elevation':a.priority==='MEDIUM'?'Resolve within 30 days — chained risk contributor':'Schedule for next patch cycle'} className={`text-[10px] font-semibold px-1.5 py-0.5 rounded ${c.badge} cursor-help`}>{a.priority}</span>
                    {a.pathId && <span className="text-[10px] text-slate-400 font-mono">CID {a.pathId}</span>}
                  </div>
                  <div className="text-[12px] font-medium text-slate-800 leading-tight">{a.action}</div>
                  <div className="flex gap-3 mt-1 text-[10px] text-slate-500">
                    <span data-tip="Estimated time for a mid-senior security/DevOps engineer to implement this fix end-to-end, including testing" className="flex items-center gap-1 cursor-help"><ClockIcon size={11} />ETA: {a.eta}</span>
                    <span data-tip={`Effort level: ${a.effort==='Low'?'Low — config change or patch apply, minimal testing needed':a.effort==='Medium'?'Medium — architecture change or multi-system coordination required':'High — major infrastructure or code change with extended testing'}`} className="flex items-center gap-1 cursor-help"><WrenchIcon size={11} />Effort: {a.effort}</span>
                    {a.roi && (
                      <Tooltip width="w-72" content={
                        <span>
                          <span style={{display:'block',fontWeight:700,marginBottom:4,borderBottom:'1px solid #334155',paddingBottom:4}}>ROI Calculation Formula</span>
                          <span style={{display:'block',marginBottom:3}}><span style={{color:'#94a3b8'}}>Formula:</span> Risk Reduction Value ÷ Remediation Cost</span>
                          <span style={{display:'block',marginBottom:3}}><span style={{color:'#94a3b8'}}>Risk Reduction Value</span> = Avg Breach Cost ($4.45M, IBM 2024) × Severity Weight × Path Exposure Score</span>
                          <span style={{display:'block',marginBottom:3}}><span style={{color:'#94a3b8'}}>Remediation Cost</span> = Engineer Rate × ETA Hours × Effort Multiplier</span>
                          <span style={{display:'block',marginTop:6,paddingTop:4,borderTop:'1px solid #334155',color:'#6ee7b7'}}>Higher ROI = greater risk eliminated per dollar spent</span>
                        </span>
                      }>
                        <span className="flex items-center gap-1 font-semibold text-emerald-600 cursor-help">
                          ROI: {parseFloat(a.roi) || a.roi}
                          <InfoIcon size={11} />
                        </span>
                      </Tooltip>
                    )}
                    {st==='fixed'      && <span className="text-green-600 font-medium flex items-center gap-1"><CheckIcon size={11} />Marked Fixed</span>}
                    {st==='suppressed' && <span className="text-slate-500 font-medium flex items-center gap-1"><EyeOffIcon size={11} />Suppressed</span>}
                    {st==='ticket'     && <span className="text-blue-600 font-medium flex items-center gap-1"><TicketIcon size={11} />Ticket Created</span>}
                  </div>
                </div>
                <div className="flex gap-1.5 shrink-0">
                  <button onClick={()=>toggle(key,'fixed')}
                    className={`flex items-center gap-1 text-[10px] px-2 py-1 rounded border transition-colors
                      ${st==='fixed'?'bg-green-600 text-white border-green-600':'border-green-300 text-green-700 hover:bg-green-50'}`}>
                    <CheckIcon size={11} />Fix
                  </button>
                  <button onClick={()=>toggle(key,'ticket')}
                    className={`flex items-center gap-1 text-[10px] px-2 py-1 rounded border transition-colors
                      ${st==='ticket'?'bg-blue-600 text-white border-blue-600':'border-blue-300 text-blue-700 hover:bg-blue-50'}`}>
                    <TicketIcon size={11} />Ticket
                  </button>
                  <button onClick={()=>toggle(key,'suppressed')}
                    className={`flex items-center gap-1 text-[10px] px-2 py-1 rounded border transition-colors
                      ${st==='suppressed'?'bg-slate-400 text-white border-slate-400':'border-slate-300 text-slate-500 hover:bg-slate-50'}`}>
                    <EyeOffIcon size={11} />Suppress
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Toxic Combination Identification */}
      <div className="bg-white rounded-lg border border-slate-200 p-4">
        <div className="flex items-center gap-2 mb-3">
          <AlertTriIcon size={16} />
          <h3 data-tip="Risk factors that, when co-present on the same asset, create non-linear risk amplification. Remediating any single factor from a toxic combination significantly reduces overall path risk." className="font-semibold text-slate-800 text-sm cursor-help">Toxic Combination Identification</h3>
        </div>
        <div className="space-y-3">
          {toxicCombos.map(tc=>(
            <div key={tc.title} className="border border-red-200 bg-red-50/20 rounded-lg p-3">
              <div className="flex items-start justify-between mb-2">
                <div className="flex flex-col gap-1">
                  <div className="flex items-center gap-2">
                    <AlertTriIcon size={14} /><SeverityBadge level={tc.sev} />
                    <span className="text-[11px] font-semibold text-slate-800">{tc.title}</span>
                  </div>
                  <div className="flex gap-3 text-[10px] text-slate-500 ml-5">
                    <span>Asset: <span className="font-mono text-slate-700">{tc.asset}</span></span>
                    <span className="font-mono text-indigo-500">{tc.mitre}</span>
                  </div>
                </div>
                <button className="text-[10px] border border-slate-300 text-slate-500 hover:bg-slate-100 px-2 py-0.5 rounded shrink-0">Suppress</button>
              </div>
              <div className="space-y-1 ml-5">
                {tc.items.map(it=>(
                  <div key={it.l} className="flex gap-2 text-[10px]">
                    <span className="text-slate-400 font-medium w-28 shrink-0">{it.l}</span>
                    <span className={it.l==='Path to Crown Jewel:'?'font-mono text-slate-700':'text-slate-600'}>{it.v}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Final Outcome */}
      <div className="rounded-lg p-5 text-white" style={{background:'linear-gradient(135deg,#065f46 0%,#0e7490 100%)'}}>
        <h4 className="text-sm font-bold mb-1.5">🎯 Path Risk Addressed</h4>
        <p className="text-[11px] leading-relaxed" style={{opacity:.85}}>
          Attack chain broken — risk score recalculated. Suppressed paths removed from active threat surface.
          Tickets tracked in external system. Continue monitoring for new paths surfaced by Qualys scan.
        </p>
        <div className="flex flex-wrap gap-2 mt-3">
          {['Risk Reduced','Tickets Created','Path Suppressed / Fixed','Score Recalculated'].map(tag=>(
            <span key={tag} className="text-[10px] font-semibold px-2.5 py-1 rounded"
              style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.3)'}}>
              {tag}
            </span>
          ))}
        </div>
        <button onClick={()=>setActiveTab('discover')}
          className="mt-3 text-[11px] font-medium flex items-center gap-1 hover:underline" style={{color:'rgba(255,255,255,0.75)'}}>
          ← Return to Discover to review more paths
        </button>
      </div>

    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [activeTab,    setActiveTab]    = useState('discover');
  const [selectedPath, setSelectedPath] = useState(null);
  const [hasVisitedAnalyze, setHasVisitedAnalyze] = useState(false);

  const tabs = [
    { id:'discover',  label:'01  Discover',  Icon:EyeIcon,    desc:'Browse & filter all attack paths' },
    { id:'analyze',   label:'02  Analyze',   Icon:TargetIcon, desc:'Drill into path detail' },
    { id:'remediate', label:'03  Remediate', Icon:WrenchIcon, desc:'Recommended remediation actions' },
  ];

  const handleSelectPath = (path) => {
    setSelectedPath(path);
    setActiveTab('analyze');
    setHasVisitedAnalyze(true);
  };

  const handleTabClick = (tabId) => {
    if (tabId === 'analyze' && !selectedPath) return;
    if (tabId === 'remediate' && !hasVisitedAnalyze) return;
    if (tabId === 'analyze' && selectedPath) setHasVisitedAnalyze(true);
    setActiveTab(tabId);
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f1f5f9'}}>
      <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>

        {/* Header */}
        <header className="flex items-center justify-between px-4 py-2 bg-white border-b border-slate-200 shrink-0">
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded flex items-center justify-center" style={{background:'#E5002B'}}>
              <ShieldIcon size={16} />
            </div>
            <span className="text-sm font-semibold text-slate-800">
              Qualys <span className="font-normal text-slate-400">Enterprise TruRisk™ Platform</span>
            </span>
          </div>
          <div className="flex items-center gap-1.5">
            <button className="p-1.5 rounded hover:bg-slate-100 text-slate-400"><SearchIcon /></button>
            <button className="p-1.5 rounded hover:bg-slate-100 text-slate-400"><BellIcon /></button>
            <button className="p-1.5 rounded hover:bg-slate-100 text-slate-400"><SettingsIcon /></button>
            <button className="w-7 h-7 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-semibold">A</button>
          </div>
        </header>

        <div style={{display:'flex',flex:1,overflow:'hidden'}}>
          <Sidebar />

          {/* Main */}
          <main style={{flex:1,overflowY:'auto'}}>
            <div className="p-5">

              {/* Page heading */}
              <div className="flex items-center justify-between mb-4">
                <div>
                  <div className="flex items-center gap-2 mb-0.5">
                    <GitBranchIcon size={20} />
                    <h1 className="text-lg font-bold text-slate-800">Attack Path Insights</h1>
                  </div>
                  <p className="text-[11px] text-slate-500">Qualys TotalCloud — Adversarial mapping, path analysis &amp; risk-correlated remediation</p>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-[11px] text-slate-500 flex items-center gap-1">
                    <ClockIcon size={13} /> Last scan: 4 min ago
                  </span>
                  <button className="text-[11px] bg-indigo-600 text-white px-3 py-1.5 rounded hover:bg-indigo-700 flex items-center gap-1.5">
                    <RefreshIcon size={13} /> Re-scan
                  </button>
                </div>
              </div>

              {/* Tabs */}
              <div className="flex border-b border-slate-200 mb-5 gap-1">
                {tabs.map(t => {
                  const isLocked = (t.id==='analyze' && !selectedPath) || (t.id==='remediate' && !hasVisitedAnalyze);
                  const lockMsg = t.id==='analyze' ? 'Select an attack path in Discover first' : 'Complete path analysis in Analyze first';
                  return (
                    <button key={t.id} onClick={()=>handleTabClick(t.id)}
                      title={isLocked ? lockMsg : ''}
                      className={`flex items-center gap-2 px-5 py-2.5 text-sm font-medium border-b-2 transition-colors -mb-px rounded-t-lg
                        ${isLocked ? 'border-transparent text-slate-300 cursor-not-allowed' :
                          activeTab===t.id ? 'border-indigo-600 text-indigo-600 bg-indigo-50/60' :
                          'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}>
                      {isLocked ? <LockIcon size={12} /> : <t.Icon size={16} />}
                      <span>{t.label}</span>
                      {isLocked && <span className="text-[9px] bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded-full font-semibold border border-slate-200">Locked</span>}
                      {!isLocked && t.id==='analyze' && selectedPath && (
                        <span className="text-[10px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded-full font-semibold">CID {selectedPath.id}</span>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* Tab content */}
              {activeTab==='discover'  && <DiscoverTab  onSelectPath={handleSelectPath} />}
              {activeTab==='analyze'   && <AnalyzeTab   selectedPath={selectedPath} setSelectedPath={(p)=>setSelectedPath(p)} setActiveTab={setActiveTab} />}
              {activeTab==='remediate' && <RemediateTab selectedPath={selectedPath} setActiveTab={setActiveTab} />}

            </div>
          </main>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<style>[data-tip]{cursor:help;}</style>
<script>
(function(){
  var tip=document.createElement('div');
  tip.style.cssText='position:fixed;z-index:99998;background:#0f172a;color:#fff;border-radius:8px;padding:10px 14px;font-size:11px;line-height:1.5;max-width:300px;box-shadow:0 4px 24px rgba(0,0,0,.55);pointer-events:none;white-space:normal;display:none;font-family:Inter,system-ui,sans-serif;';
  document.body.appendChild(tip);
  var cur=null;
  document.addEventListener('mouseover',function(e){
    var el=e.target.closest('[data-tip]');
    if(!el)return;
    cur=el;
    tip.textContent=el.getAttribute('data-tip');
    tip.style.display='block';
    move(e);
  });
  document.addEventListener('mousemove',function(e){if(cur)move(e);});
  document.addEventListener('mouseout',function(e){
    var el=e.target.closest('[data-tip]');
    if(el&&!el.contains(e.relatedTarget)){cur=null;tip.style.display='none';}
  });
  function move(e){
    var x=e.clientX,y=e.clientY,w=tip.offsetWidth,h=tip.offsetHeight;
    var l=x+14; if(l+w>window.innerWidth-8)l=x-w-14;
    var t=y-h-12; if(t<4)t=y+20;
    tip.style.left=l+'px';tip.style.top=t+'px';
  }
})();
</script>
</body>
</html>
